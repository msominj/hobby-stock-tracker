<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hobby Stock Tracker</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue.js via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app">
        <nav class="bg-blue-700 text-white px-4 py-3 flex items-center justify-between shadow">
            <div class="flex items-center space-x-4">
                <span class="text-2xl font-bold tracking-tight">🧵 Hobby Stock Tracker</span>
                <a href="/" class="hover:bg-blue-800 px-3 py-2 rounded transition">Home</a>
                <a href="/inventory" class="hover:bg-blue-800 px-3 py-2 rounded transition">Inventory</a>
                <a href="/wishlist" class="hover:bg-blue-800 px-3 py-2 rounded transition">Wishlist</a>
            </div>
            <span class="text-sm opacity-70">Craft. Track. Shop.</span>
        </nav>
        <main class="p-4 max-w-5xl mx-auto">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
